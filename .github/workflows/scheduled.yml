name: scheduled

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # dependency advisories move independently of commits: re-check weekly
  advisories:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  # longer fuzz runs than the per-push smoke job
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: rustup toolchain install nightly --profile minimal && rustup default nightly
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: fuzz each target
        run: |
          # the prebuilt cargo-fuzz defaults to its own (musl) build target, which is
          # incompatible with the address sanitizer: always fuzz the host triple
          host=$(rustc -vV | sed -n 's/host: //p')
          for target in $(cargo fuzz list); do
            cargo fuzz run "$target" --target "$host" -- -max_total_time=300
          done

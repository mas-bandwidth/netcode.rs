[package]
name = "netcode"
version = "0.1.0"
edition = "2021"
rust-version = "1.70"
authors = ["Más Bandwidth LLC"]
description = "A Rust implementation of the netcode network protocol"
license = "BSD-3-Clause"
repository = "https://github.com/mas-bandwidth/netcode.rs"
readme = "README.md"
keywords = ["gamedev", "networking", "udp", "protocol", "netcode"]
categories = ["game-development", "network-programming"]

[dependencies]
chacha20poly1305 = "0.10"
getrandom = "0.3"
log = "0.4"
socket2 = "0.6"

[dev-dependencies]
env_logger = "0.11"

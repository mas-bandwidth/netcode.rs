# cargo-deny configuration: dependency advisories, licenses and sources.
# https://embarkstudios.github.io/cargo-deny/

[advisories]
yanked = "deny"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "Unicode-3.0",
    "LicenseRef-MBSL",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
